<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3693ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Furgone AR7</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blu:#3693ff;--blu-dark:#1a7aee;--verde:#007d04;--verde-dark:#005a03;--grigio-bg:#f4f5f8;--testo:#1a1a2e;--testo2:#555577;--bordo:#e0e0f0;--danger:#c0392b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--grigio-bg);color:var(--testo);min-height:100vh;font-size:15px}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:var(--grigio-bg)}
.topbar{background:var(--blu);color:#fff;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo-circle{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.logo-circle img{width:100%;height:100%;object-fit:contain}
.logo-placeholder{font-size:11px;font-weight:700;color:var(--blu);text-align:center;line-height:1.1}
.badge-role{font-size:10px;background:var(--verde);color:#fff;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}
.content{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:80px}
.card{background:#fff;border-radius:14px;border:0.5px solid var(--bordo);padding:16px;box-shadow:0 1px 4px rgba(0,38,255,.05)}
.card-title{font-size:13px;font-weight:600;color:var(--testo2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
label{font-size:13px;color:var(--testo2);margin-bottom:4px;display:block}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--bordo);border-radius:9px;font-size:15px;color:#000;background:#fff;outline:none;transition:border .2s}
input:focus,select:focus{border-color:var(--blu)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.btn{width:100%;padding:13px;border:none;border-radius:11px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blu);color:#fff}.btn-primary:hover{background:var(--blu-dark)}
.btn-success{background:var(--verde);color:#fff}.btn-success:hover{background:var(--verde-dark)}
.btn-outline{background:transparent;color:var(--blu);border:1.5px solid var(--blu)}
.btn-sm{padding:7px 14px;font-size:13px;width:auto;border-radius:8px}
.btn-danger{background:var(--danger);color:#fff}
.bottom-nav{display:flex;background:#fff;border-top:0.5px solid var(--bordo);padding:6px 0 10px;position:sticky;bottom:0;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 2px;border:none;background:none;color:var(--testo2);font-size:9px;transition:color .2s;line-height:1.2}
.nav-item.active{color:var(--blu)}
.nav-icon{font-size:19px;line-height:1}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--grigio-bg);border-radius:10px;padding:12px;text-align:center;border:0.5px solid var(--bordo)}
.stat-val{font-size:22px;font-weight:700;color:var(--blu)}
.stat-lbl{font-size:11px;color:var(--testo2);margin-top:2px}
.entry-item{border-bottom:0.5px solid var(--bordo);padding:12px 0;display:flex;flex-direction:column;gap:4px}
.entry-item:last-child{border-bottom:none}
.entry-head{display:flex;justify-content:space-between;align-items:center}
.entry-name{font-weight:600;font-size:15px}
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:8px;font-weight:600}
.tag-ar7{background:#ddeeff;color:#1a6acc}.tag-scout{background:#d4edda;color:#007d04}.tag-altro{background:#fef3cd;color:#856404}.tag-anon{background:#f0f0f0;color:#666}
.costo-badge{font-size:14px;font-weight:700;color:var(--verde);background:#eafbe6;padding:3px 10px;border-radius:8px}
.costo-box{background:#eafbe6;border-radius:10px;padding:12px;margin-top:8px;border:1px solid #b8e6ba}
.costo-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--testo2)}
.costo-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding-top:8px;margin-top:6px;border-top:1px solid #b8e6ba;color:var(--verde)}
.section-title{font-size:18px;font-weight:700;color:var(--testo);margin-bottom:4px}
.sub-title{font-size:13px;color:var(--testo2);margin-bottom:12px}
.empty-state{text-align:center;padding:30px 16px;color:var(--testo2)}
.empty-icon{font-size:40px;margin-bottom:8px}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--blu)}
.login-card{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,38,255,.18)}
.login-logo{width:72px;height:72px;border-radius:50%;background:var(--blu);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;overflow:hidden}
.login-logo img{width:100%;height:100%;object-fit:contain}
.login-title{text-align:center;font-size:20px;font-weight:700;color:var(--blu);margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--testo2);margin-bottom:20px}
.divider{text-align:center;color:var(--testo2);font-size:12px;margin:10px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:0.5px;background:var(--bordo)}
.divider::before{left:0}.divider::after{right:0}
.admin-tab-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.admin-tab{padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;border:1px solid var(--bordo);color:var(--testo2);white-space:nowrap;font-weight:500}
.admin-tab.active{background:var(--blu);color:#fff;border-color:var(--blu)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 18px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--testo2);line-height:1}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bordo)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bordo);position:relative;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:var(--verde)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:10px}
.alert-err{background:#fde8e8;color:var(--danger);border:1px solid #f5c6c6}
.alert-ok{background:#e8f5e9;color:var(--verde);border:1px solid #c8e6c9}
.user-chip{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--grigio-bg);border-radius:10px;margin-bottom:8px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--blu);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-info{flex:1}.user-name{font-size:14px;font-weight:600}.user-role{font-size:11px;color:var(--testo2)}
.tariffa-info{background:#f0f6ff;border-radius:10px;padding:10px 12px;font-size:12px;color:var(--testo2);margin-top:6px;border:1px solid #cce0ff;line-height:1.6}
.reg-result{background:#eafbe6;border-radius:12px;padding:16px;border:1px solid #b8e6ba;margin-bottom:12px}
.reg-result-title{font-size:13px;color:var(--verde);font-weight:600;margin-bottom:8px}
.reg-credential{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid #b8e6ba}
.reg-credential-label{font-size:11px;color:var(--testo2);margin-bottom:2px}
.reg-credential-value{font-size:15px;font-weight:700;color:var(--testo);font-family:monospace;word-break:break-all}
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pill{padding:5px 14px;border-radius:20px;border:1.5px solid var(--bordo);font-size:13px;cursor:pointer;background:#fff;color:var(--testo);transition:all .2s;white-space:nowrap}
.pill.sel{background:var(--blu);color:#fff;border-color:var(--blu)}
.loading{text-align:center;padding:40px;color:var(--testo2);font-size:15px}
.spinner{width:36px;height:36px;border:3px solid var(--bordo);border-top-color:var(--blu);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
canvas{display:block;width:100%!important}
.chart-wrap{position:relative;width:100%;margin:0 auto}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--testo2)}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div>Caricamento...</div></div>
<script>
// ═══════════════════════════════════════════
//  CONFIGURAZIONE SUPABASE
//  Sostituisci con le tue credenziali dopo aver rigenerato la chiave
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://nxopqexvmespoghtguus.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54b3BxZXh2bWVzcG9naHRndXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDcwNzMsImV4cCI6MjA5MjM4MzA3M30.Ky1YUjtd-0w9jZGbv2FRv2Y0OLkJxxGITfK-y-pjZmE';
const LOGO_DEFAULT = '/logo.png';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════
//  STATO GLOBALE
// ═══════════════════════════════════════════
const APP = {
  user: null,        // utente Supabase auth
  profilo: null,     // riga dalla tabella profili
  tab: 'nuovo',
  adminTab: 'panoramica',
  modal: null,
  editId: null,
  logoUrl: LOGO_DEFAULT,
  filterUser: '',
  filterTariffa: '',
  alert: null,
  subview: null,
  regResult: null,
  viaggioInCorso: null,
  viaggi: [],
  utenti: [],
  team: [],
  cfg: {
    tariffa_scout_giorno: 20, tariffa_scout_km_inclusi: 100,
    tariffa_scout_extra_ogni: 50, tariffa_scout_extra_costo: 5,
    tariffa_altro_giorno: 30, tariffa_altro_km_inclusi: 100,
    tariffa_altro_extra_ogni: 50, tariffa_altro_extra_costo: 5,
    carburante_consumo: 8, carburante_prezzo: 2.5, logo_url: ''
  }
};

let chartInstances = {};

// ═══════════════════════════════════════════
//  SUPABASE — DATI
// ═══════════════════════════════════════════
async function loadConfig() {
  const { data } = await sb.from('config').select('*');
  if (data) data.forEach(r => { APP.cfg[r.chiave] = isNaN(r.valore) ? r.valore : parseFloat(r.valore); });
  APP.logoUrl = APP.cfg.logo_url || LOGO_DEFAULT;
}

async function loadViaggi() {
  const isAdm = isAdmin(APP.profilo);
  let q = sb.from('viaggi').select('*').order('created_at', { ascending: true });
  if (!isAdm) q = q.eq('uid', APP.user.id);
  const { data, error } = await q;
  if (!error) APP.viaggi = data || [];
}

async function loadUtenti() {
  const { data } = await sb.from('profili').select('*').order('nome');
  APP.utenti = data || [];
}

async function loadTeam() {
  const { data } = await sb.from('team').select('*').order('nome');
  APP.team = data || [];
}

async function loadAll() {
  await loadConfig();
  await loadViaggi();
  if (isAdmin(APP.profilo)) { await loadUtenti(); await loadTeam(); }
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const val = id => { const el = $(id); return el ? el.value : ''; };
function uid() { return 'x' + Math.random().toString(36).substr(2, 9); }
function fmtDate(s) { if (!s) return '-'; const d = new Date(s); return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }); }
function giorni(r, c) { if (!r || !c) return 1; return Math.max(1, Math.ceil((new Date(c) - new Date(r)) / 86400000)); }
function isAdmin(p) { return p && (p.ruolo === 'admin' || p.ruolo === 'gestore'); }
function isGestore(p) { return p && p.ruolo === 'gestore'; }

function generaEmail(nome, cognome) {
  const base = (nome.trim().toLowerCase() + '.' + cognome.trim().toLowerCase()).normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '.');
  const esistenti = APP.utenti.map(u => u.email || '');
  const c = base + '@ar7.it'; if (!esistenti.includes(c)) return c;
  let i = 2; while (esistenti.includes(base + i + '@ar7.it')) i++; return base + i + '@ar7.it';
}

function calcolaCosto(v) {
  if (!v.tariffa || !v.approvato) return null;
  const c = APP.cfg; const km = Math.max(0, (v.km_f || 0) - (v.km_i || 0));
  const gg = giorni(v.ritiro, v.riconsegna);
  let base = 0, kmExtra = 0, carburante = 0;
  if (v.tariffa === 'Scout') {
    base = c.tariffa_scout_giorno * gg;
    const extra = Math.max(0, km - c.tariffa_scout_km_inclusi * gg);
    kmExtra = Math.ceil(extra / c.tariffa_scout_extra_ogni) * c.tariffa_scout_extra_costo;
  } else if (v.tariffa === 'Altro') {
    base = c.tariffa_altro_giorno * gg;
    const extra = Math.max(0, km - c.tariffa_altro_km_inclusi * gg);
    kmExtra = Math.ceil(extra / c.tariffa_altro_extra_ogni) * c.tariffa_altro_extra_costo;
  }
  if (!v.pieno) carburante = (km / 100) * c.carburante_consumo * c.carburante_prezzo;
  return { base, kmExtra, carburante, totale: base + kmExtra + carburante, km, gg };
}

function showAlert(msg, tipo = 'ok', dur = 3500) {
  APP.alert = { msg, tipo }; render();
  setTimeout(() => { APP.alert = null; render(); }, dur);
}

function tagTariffa(t) {
  if (!t) return `<span class="tag tag-anon">N/D</span>`;
  if (t === 'AR7') return `<span class="tag tag-ar7">AR7</span>`;
  if (t === 'Scout') return `<span class="tag tag-scout">Altri Scout</span>`;
  return `<span class="tag tag-altro">Altro</span>`;
}

function destroyCharts() { Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch (e) { } }); chartInstances = {}; }

// ═══════════════════════════════════════════
//  RENDER PRINCIPALE
// ═══════════════════════════════════════════
function render() {
  destroyCharts();
  const app = $('app'); if (!app) return;
  if (!APP.user) {
    if (APP.subview === 'registrati') { app.innerHTML = renderRegistrati(); bindRegistrati(); return; }
    app.innerHTML = renderLogin(); bindLogin(); return;
  }
  app.innerHTML = `<div style="display:flex;flex-direction:column;min-height:100vh">${renderTopbar()}<div class="content" id="main-content">${renderAlert()}${renderMain()}</div>${renderBottomNav()}</div>${APP.modal ? renderModal() : ''}`;
  bindMain();
  if (APP.tab === 'statistiche') setTimeout(initCharts, 80);
}

function renderAlert() { if (!APP.alert) return ''; return `<div class="alert alert-${APP.alert.tipo === 'ok' ? 'ok' : 'err'}">${APP.alert.msg}</div>`; }

function renderTopbar() {
  const p = APP.profilo;
  const lc = APP.logoUrl ? `<img src="${APP.logoUrl}" alt="logo">` : `<div class="logo-placeholder">AR7</div>`;
  return `<div class="topbar"><div style="display:flex;align-items:center;gap:8px;flex:1"><div class="logo-circle">${lc}</div><div><div style="font-size:15px;font-weight:700">Furgone Scout AR7</div><div style="font-size:11px;opacity:.8">Arezzo 7</div></div></div><span class="badge-role">${p ? p.ruolo : ''}</span><button onclick="doLogout()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 4px 4px 10px">⏏</button></div>`;
}

function renderBottomNav() {
  const p = APP.profilo; let tabs;
  if (isGestore(p)) tabs = [{ id: 'nuovo', icon: '➕', lbl: 'Nuovo viaggio' }, { id: 'storico', icon: '📋', lbl: 'Tutti i viaggi' }, { id: 'admin', icon: '📊', lbl: 'Riepilogo' }, { id: 'statistiche', icon: '📈', lbl: 'Statistiche' }, { id: 'impostazioni', icon: '⚙️', lbl: 'Gestione' }];
  else if (isAdmin(p)) tabs = [{ id: 'nuovo', icon: '➕', lbl: 'Nuovo viaggio' }, { id: 'storico', icon: '📋', lbl: 'Tutti i viaggi' }, { id: 'admin', icon: '📊', lbl: 'Riepilogo' }, { id: 'statistiche', icon: '📈', lbl: 'Statistiche' }, { id: 'impostazioni', icon: '⚙️', lbl: 'Impostazioni' }];
  else tabs = [{ id: 'nuovo', icon: '➕', lbl: 'Nuovo viaggio' }, { id: 'storico', icon: '📋', lbl: 'I miei viaggi' }, { id: 'impostazioni', icon: '⚙️', lbl: 'Impostazioni' }];
  return `<div class="bottom-nav">${tabs.map(t => `<button class="nav-item ${APP.tab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')"><span class="nav-icon">${t.icon}</span>${t.lbl}</button>`).join('')}</div>`;
}

function renderMain() {
  switch (APP.tab) {
    case 'nuovo': return renderNuovo();
    case 'storico': return renderStorico();
    case 'admin': return renderAdmin();
    case 'statistiche': return renderStatistiche();
    case 'impostazioni': return renderImpostazioni();
    default: return renderNuovo();
  }
}

// ═══════════════════════════════════════════
//  NUOVO VIAGGIO
// ═══════════════════════════════════════════
function renderNuovo() {
  const p = APP.profilo;
  const pn = p ? p.nome.split(' ')[0] : '';
  const pc = p && p.nome.includes(' ') ? p.nome.split(' ').slice(1).join(' ') : '';
  const vp = APP.viaggioInCorso;
  return `
  <div class="section-title">Nuovo viaggio</div>
  <div class="sub-title">Registra l'utilizzo del furgone in due fasi</div>
  <div class="card" style="${vp ? 'opacity:.55;pointer-events:none' : ''}">
    <div class="card-title"><span style="background:var(--blu);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">1</span>Inizio viaggio</div>
    <div class="row2">
      <div class="field"><label>Nome</label><input id="f-nome" value="${vp ? vp.nome : pn}"/></div>
      <div class="field"><label>Cognome <span style="font-size:11px;color:#aaa">(opz.)</span></label><input id="f-cognome" value="${vp ? vp.cognome : pc}"/></div>
    </div>
    <div class="field" style="margin-top:10px"><label>Utilizzo / Destinazione</label><input id="f-utilizzo" value="${vp ? vp.utilizzo : ''}" placeholder="es. Riunione reparto..."/></div>
    <div class="row2" style="margin-top:10px">
      <div class="field"><label>Km iniziali</label><input id="f-kmi" type="number" value="${vp ? vp.km_i : ''}"/></div>
      <div class="field"><label>Data e ora ritiro</label><input id="f-ritiro" type="datetime-local" value="${vp ? vp.ritiro : ''}"/></div>
    </div>
    ${!vp ? `<button class="btn btn-primary" style="margin-top:14px" onclick="iniziaViaggio()">🚐 Inizia viaggio</button>` : `<div style="margin-top:12px;background:#eafbe6;border-radius:9px;padding:10px 12px;font-size:13px;color:var(--verde);font-weight:600">✓ Viaggio in corso — completa la fase 2</div>`}
  </div>
  <div class="card" style="${!vp ? 'opacity:.45;pointer-events:none' : ''}">
    <div class="card-title"><span style="background:${vp ? 'var(--verde)' : '#bbb'};color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">2</span>Fine viaggio</div>

function renderStorico() {
  const p = APP.profilo; const tutti = isAdmin(p);
  let list = [...APP.viaggi];
  const f = APP.filterTariffa, fu = APP.filterUser || '';
  if (f) list = list.filter(v => f === 'ND' ? !v.tariffa : v.tariffa === f);
  if (fu && tutti) list = list.filter(v => (v.nome + ' ' + v.cognome).toLowerCase().includes(fu.toLowerCase()));
  list = list.slice().reverse();
  return `
  <div class="section-title">${tutti ? 'Tutti i viaggi' : 'I miei viaggi'}</div>
  <div class="sub-title">${list.length} viaggio/i</div>
  ${tutti ? `<input id="filter-user" placeholder="🔍 Cerca per nome..." value="${fu}" oninput="APP.filterUser=this.value;renderInner()" style="margin-bottom:8px"/>` : ''}
  <div class="filter-row">${['', 'AR7', 'Scout', 'Altro', 'ND'].map(k => `<button class="pill ${f === k ? 'sel' : ''}" onclick="APP.filterTariffa='${k}';renderInner()">${k === '' ? 'Tutti' : k === 'ND' ? 'N/D' : k === 'Scout' ? 'Altri Scout' : k}</button>`).join('')}</div>

}

function renderEntryItem(v, adminView) {
  const km = Math.max(0, (v.km_f || 0) - (v.km_i || 0));
  const det = calcolaCosto(v);
  const c = APP.cfg;
  return `<div class="entry-item">
    <div class="entry-head"><span class="entry-name">${v.nome} ${v.cognome}</span>${det ? `<span class="costo-badge">€${det.totale.toFixed(2)}</span>` : `<span class="tag tag-anon">In attesa</span>`}</div>
    <div style="font-size:13px;color:var(--testo2)">📍 ${v.utilizzo}</div>
    <div style="font-size:13px;color:var(--testo2)">🛣 ${km} km (${v.km_i}→${v.km_f || '?'})</div>
    <div style="font-size:12px;color:var(--testo2)">📅 ${fmtDate(v.ritiro)} → ${fmtDate(v.riconsegna)}</div>
    <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      ${tagTariffa(v.tariffa)}
      ${v.pieno ? `<span class="tag" style="background:#fff3e0;color:#e65100">⛽ Pieno</span>` : `<span class="tag" style="background:#fde8e8;color:#c0392b">⛽ No pieno</span>`}
      ${adminView ? `<button class="btn btn-outline btn-sm" onclick="openEditViaggio('${v.id}')">✏️ Modifica</button><button class="btn btn-danger btn-sm" onclick="deleteViaggio('${v.id}')">🗑</button>` : ''}
    </div>
    ${det && !adminView ? renderCostoBox(det, v.tariffa) : ''}
    ${det && adminView ? `<div style="font-size:12px;color:var(--testo2);margin-top:4px">Base €${det.base.toFixed(2)} + Extra €${det.kmExtra.toFixed(2)} + Carb. €${det.carburante.toFixed(2)}</div>` : ''}
    ${adminView && !v.tariffa ? `<div style="margin-top:8px;display:flex;align-items:center;gap:8px"><label style="font-size:12px;color:var(--testo2);white-space:nowrap;margin:0">Tariffa:</label><select style="flex:1;padding:6px 10px;font-size:13px;border-radius:8px;border:1px solid var(--bordo);color:#000;background:#fff" onchange="setTariffaRapida('${v.id}',this.value)"><option value="">— Seleziona —</option><option value="AR7">AR7 (gratuita)</option><option value="Scout">Altri Scout (€${c.tariffa_scout_giorno}/g)</option><option value="Altro">Altro (€${c.tariffa_altro_giorno}/g)</option></select></div>` : ''}
  </div>`;
}

function renderCostoBox(det, tariffa) {
  const c = APP.cfg; const t = tariffa === 'Scout' ? { base: c.tariffa_scout_giorno } : tariffa === 'Altro' ? { base: c.tariffa_altro_giorno } : { base: 0 };
  return `<div class="costo-box">
    ${det.base > 0 ? `<div class="costo-row"><span>Base (${det.gg} g × €${t.base})</span><span>€${det.base.toFixed(2)}</span></div>` : ''}
    ${det.kmExtra > 0 ? `<div class="costo-row"><span>Km extra</span><span>€${det.kmExtra.toFixed(2)}</span></div>` : ''}
    ${det.carburante > 0 ? `<div class="costo-row"><span>⛽ Carburante stimato</span><span>€${det.carburante.toFixed(2)}</span></div>` : ''}
    <div class="costo-total"><span>Totale</span><span>€${det.totale.toFixed(2)}</span></div>
  </div>`;
}

function renderStatistiche() {

  <div class="card"><div class="card-title">Distribuzione tariffe</div><div class="chart-wrap" style="height:220px;display:flex;align-items:center;justify-content:center"><canvas id="chart-tariffe" style="max-width:220px;max-height:220px"></canvas></div><div class="legend-row" id="legend-tariffe"></div></div>
  <div class="card"><div class="card-title">Pieno effettuato</div><div class="chart-wrap" style="height:220px;display:flex;align-items:center;justify-content:center"><canvas id="chart-pieno" style="max-width:220px;max-height:220px"></canvas></div><div class="legend-row" id="legend-pieno"></div></div>
  <div class="card"><div class="card-title">Km nel tempo</div><div class="chart-wrap" style="height:240px"><canvas id="chart-km"></canvas></div></div>`;
}
function initCharts() {
  if (typeof Chart === 'undefined') return;
  const viaggi = APP.viaggi;
  const tarCounts = { AR7: 0, Scout: 0, Altro: 0 };
  viaggi.filter(v => v.tariffa && tarCounts[v.tariffa] !== undefined).forEach(v => tarCounts[v.tariffa]++);
  buildPie('chart-tariffe', 'legend-tariffe', ['AR7', 'Altri Scout', 'Altro'], [tarCounts.AR7, tarCounts.Scout, tarCounts.Altro], ['#a8ccff', '#7ecb82', '#fdd88a']);
  const conPieno = viaggi.filter(v => v.pieno).length;
  buildPie('chart-pieno', 'legend-pieno', ['Sì', 'No'], [conPieno, viaggi.length - conPieno], ['#7ecb82', '#f4a0a0']);
  const sorted = viaggi.filter(v => v.km_f).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const c3 = $('chart-km'); if (!c3) return;
  chartInstances['km'] = new Chart(c3, { type: 'line', data: { labels: sorted.map(v => { const d = new Date(v.created_at); return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }); }), datasets: [{ label: 'Km', data: sorted.map(v => v.km_f), borderColor: '#3693ff', backgroundColor: 'rgba(54,147,255,.10)', borderWidth: 2, pointBackgroundColor: '#3693ff', pointRadius: 4, fill: true, tension: .3 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#888' } }, y: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 11 }, color: '#888' } } } } });
}
function buildPie(canvasId, legendId, labels, data, colors) {
  const c = $(canvasId); if (!c) return;
  const tot = data.reduce((a, b) => a + b, 0);
  chartInstances[canvasId] = new Chart(c, { type: 'pie', data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] }, options: { responsive: true, maintainAspectRatio: true, aspectRatio: 1, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `  ${ctx.label}: ${ctx.parsed} (${tot ? Math.round(ctx.parsed / tot * 100) : 0}%)` } }, datalabels: { color: '#333', font: { size: 12, weight: '600' }, formatter: (value, ctx) => { const pct = tot ? Math.round(value / tot * 100) : 0; if (pct < 7) return ''; return labels[ctx.dataIndex] + '\n' + pct + '%'; }, textAlign: 'center', display: true } } }, plugins: [ChartDataLabels] });
  const leg = $(legendId); if (leg) leg.innerHTML = '';
}

      <div class="row2" style="margin-bottom:10px"><div class="field"><label>Nome</label><input id="r-nome"/></div><div class="field"><label>Cognome <span style="font-size:11px;color:#aaa">(opz.)</span></label><input id="r-cognome"/></div></div>
      <div class="field" style="margin-bottom:10px"><label>Password</label><input id="r-pass" type="password"/></div>
      <div class="field" style="margin-bottom:14px"><label>Conferma password</label><input id="r-pass2" type="password"/></div>
      <button class="btn btn-primary" onclick="doRegistrati()">Crea account</button>
      <button class="btn btn-outline" style="margin-top:10px" onclick="goLogin()">← Torna al login</button>
    `}
  </div></div>`;
}

// ═══════════════════════════════════════════
//  MODALI
// ═══════════════════════════════════════════
function renderModal() {
  const m = APP.modal;
  if (m === 'edit-viaggio') return renderModalEditViaggio();
  if (m === 'add-utente') return renderModalAddUtente();
  if (m === 'edit-utente') return renderModalEditUtente();
  if (m === 'add-team') return renderModalAddTeam();
  if (m === 'edit-team') return renderModalEditTeam();
  return '';
}
function renderModalEditViaggio() {
  const v = APP.viaggi.find(x => x.id === APP.editId); if (!v) return '';
  const c = APP.cfg;
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">✏️ Modifica viaggio</div>
    <div class="row2" style="margin-bottom:8px"><div class="field"><label>Nome</label><input id="m-nome" value="${v.nome}"/></div><div class="field"><label>Cognome <span style="font-size:11px;color:#aaa">(opz.)</span></label><input id="m-cognome" value="${v.cognome || ''}"/></div></div>
    <div class="field" style="margin-bottom:8px"><label>Utilizzo</label><input id="m-utilizzo" value="${v.utilizzo}"/></div>
    <div class="row2" style="margin-bottom:8px"><div class="field"><label>Km iniziali</label><input id="m-kmi" type="number" value="${v.km_i}"/></div><div class="field"><label>Km finali</label><input id="m-kmf" type="number" value="${v.km_f || ''}"/></div></div>
    <div class="row2" style="margin-bottom:8px"><div class="field"><label>Ritiro</label><input id="m-ritiro" type="datetime-local" value="${v.ritiro ? v.ritiro.slice(0,16) : ''}"/></div><div class="field"><label>Riconsegna</label><input id="m-riconsegna" type="datetime-local" value="${v.riconsegna ? v.riconsegna.slice(0,16) : ''}"/></div></div>
    <div class="field" style="margin-bottom:10px"><label>⚡ Tariffa</label>
      <select id="m-tariffa"><option value="">Nessuna</option><option ${v.tariffa === 'AR7' ? 'selected' : ''} value="AR7">AR7 — gratuita</option><option ${v.tariffa === 'Scout' ? 'selected' : ''} value="Scout">Altri Scout — €${c.tariffa_scout_giorno}/g</option><option ${v.tariffa === 'Altro' ? 'selected' : ''} value="Altro">Altro — €${c.tariffa_altro_giorno}/g</option></select>
    </div>
    <div class="switch-row" style="margin-bottom:6px"><span style="font-size:14px">⛽ Pieno effettuato</span><button class="toggle ${v.pieno ? 'on' : ''}" id="m-pieno" onclick="this.classList.toggle('on')"></button></div>
    <div class="switch-row" style="margin-bottom:14px"><span style="font-size:14px">✅ Approvato</span><button class="toggle ${v.approvato ? 'on' : ''}" id="m-approvato" onclick="this.classList.toggle('on')"></button></div>
    <button class="btn btn-success" onclick="saveEditViaggio()">Salva modifiche</button>
  </div></div>`;
}
function renderModalAddUtente() {
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">👤 Nuovo utente</div>
    <div class="row2" style="margin-bottom:10px"><div class="field"><label>Nome</label><input id="m-unome"/></div><div class="field"><label>Cognome <span style="font-size:11px;color:#aaa">(opz.)</span></label><input id="m-ucognome"/></div></div>
    <div class="field" style="margin-bottom:4px"><label>Email (opzionale)</label><input id="m-uemail" placeholder="lascia vuoto per auto-generare"/></div>
    <div style="font-size:11px;color:var(--testo2);margin-bottom:8px">Auto: nome.cognome@ar7.it</div>
    <div class="field" style="margin-bottom:8px"><label>Password</label><input id="m-upass" type="password"/></div>
    <div class="field" style="margin-bottom:14px"><label>Ruolo</label><select id="m-uruolo"><option value="utente">Utente</option><option value="admin">Admin</option><option value="gestore">Gestore</option></select></div>
    <button class="btn btn-success" onclick="saveAddUtente()">Aggiungi utente</button>
  </div></div>`;
}
function renderModalEditUtente() {
  const u = APP.utenti.find(x => x.id === APP.editId); if (!u) return '';
  const np = u.nome.split(' ')[0] || ''; const cp = u.nome.includes(' ') ? u.nome.split(' ').slice(1).join(' ') : '';
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">✏️ Modifica utente</div>
    <div class="row2" style="margin-bottom:8px"><div class="field"><label>Nome</label><input id="m-unome" value="${np}"/></div><div class="field"><label>Cognome <span style="font-size:11px;color:#aaa">(opz.)</span></label><input id="m-ucognome" value="${cp}"/></div></div>
    <div class="field" style="margin-bottom:14px"><label>Ruolo</label><select id="m-uruolo"><option ${u.ruolo === 'utente' ? 'selected' : ''} value="utente">Utente</option><option ${u.ruolo === 'admin' ? 'selected' : ''} value="admin">Admin</option><option ${u.ruolo === 'gestore' ? 'selected' : ''} value="gestore">Gestore</option></select></div>
    <button class="btn btn-success" onclick="saveEditUtente()">Salva modifiche</button>
  </div></div>`;
}
function renderModalAddTeam() {
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">🏕 Nuovo team</div>
    <div class="field" style="margin-bottom:8px"><label>Nome team</label><input id="m-tnome"/></div>
    <div class="field" style="margin-bottom:8px"><label>Descrizione</label><input id="m-tdesc"/></div>
    <div class="field" style="margin-bottom:14px"><label>Responsabile</label><select id="m-tresp">${APP.utenti.map(u => `<option value="${u.id}">${u.nome}</option>`).join('')}</select></div>
    <button class="btn btn-success" onclick="saveAddTeam()">Crea team</button>
  </div></div>`;
}
function renderModalEditTeam() {
  const t = APP.team.find(x => x.id === APP.editId); if (!t) return '';
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">✏️ Modifica team</div>
    <div class="field" style="margin-bottom:8px"><label>Nome team</label><input id="m-tnome" value="${t.nome}"/></div>
    <div class="field" style="margin-bottom:8px"><label>Descrizione</label><input id="m-tdesc" value="${t.descrizione || ''}"/></div>
    <div class="field" style="margin-bottom:14px"><label>Responsabile</label><select id="m-tresp">${APP.utenti.map(u => `<option value="${u.id}" ${t.responsabile_id === u.id ? 'selected' : ''}>${u.nome}</option>`).join('')}</select></div>
    <button class="btn btn-success" onclick="saveEditTeam()">Salva modifiche</button>
  </div></div>`;
}

// ═══════════════════════════════════════════
//  BIND
// ═══════════════════════════════════════════
function bindLogin() { const p = $('l-pass'); if (p) p.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }); }
function bindRegistrati() { const p = $('r-pass2'); if (p) p.addEventListener('keydown', e => { if (e.key === 'Enter') doRegistrati(); }); }
function bindMain() {
  const kmf = $('f-kmf');
  if (kmf && APP.viaggioInCorso) { const upd = () => { const el = $('km-preview'); if (!el) return; const d = parseFloat(kmf.value || 0) - parseFloat(APP.viaggioInCorso.km_i || 0); el.innerHTML = d > 0 ? `<b>${d} km</b> percorsi` : ''; }; kmf.addEventListener('input', upd); }
}
function renderInner() { const mc = $('main-content'); if (mc) { mc.innerHTML = renderAlert() + renderMain(); bindMain(); if (APP.tab === 'statistiche') setTimeout(initCharts, 80); } }

// ═══════════════════════════════════════════
//  ACTIONS — NAVIGAZIONE
// ═══════════════════════════════════════════
window.setTab = async t => { APP.tab = t; if (isAdmin(APP.profilo)) { await loadViaggi(); if (t === 'admin' || t === 'statistiche') { await loadUtenti(); await loadTeam(); } } render(); };
window.setAdminTab = t => { APP.adminTab = t; render(); };
window.closeModal = e => { if (!e || e.target === e.currentTarget) { APP.modal = null; APP.editId = null; render(); } };
window.goRegistrati = () => { APP.subview = 'registrati'; APP.regResult = null; APP.alert = null; render(); };
window.goLogin = () => { APP.subview = null; APP.regResult = null; APP.alert = null; render(); };

// ═══════════════════════════════════════════
//  ACTIONS — AUTH
// ═══════════════════════════════════════════
window.doLogin = async function () {
  const email = val('l-email').trim(), pass = val('l-pass');
  if (!email || !pass) { APP.alert = { msg: 'Inserisci utente e password', tipo: 'err' }; render(); return; }
  $('app').innerHTML = '<div class="loading"><div class="spinner"></div>Accesso in corso...</div>';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { APP.alert = { msg: 'Credenziali non valide', tipo: 'err' }; render(); return; }
  APP.user = data.user;
  const { data: profilo, error: pe } = await sb.from('profili').select('*').eq('id', APP.user.id).single();
  if (pe || !profilo) {
    // Profilo non trovato: crea uno di default
    const nomeDefault = APP.user.email.split('@')[0];
    await sb.from('profili').insert({ id: APP.user.id, nome: nomeDefault, ruolo: 'utente' });
    const { data: p2 } = await sb.from('profili').select('*').eq('id', APP.user.id).single();
    APP.profilo = p2;
  } else {
    APP.profilo = profilo;
  }
  await loadAll();
  APP.tab = 'nuovo'; APP.alert = null; render();
};

window.doLoginConCredenziali = async function (email, pass) {
  $('app').innerHTML = '<div class="loading"><div class="spinner"></div>Accesso in corso...</div>';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { APP.alert = { msg: 'Errore accesso', tipo: 'err' }; render(); return; }
  APP.user = data.user;
  const { data: profilo } = await sb.from('profili').select('*').eq('id', APP.user.id).single();
  APP.profilo = profilo;
  await loadAll();
  APP.subview = null; APP.regResult = null; APP.tab = 'nuovo'; render();
};

window.doAnonimo = function () {
  APP.user = { id: 'anon-' + Math.random().toString(36).substr(2, 9), email: '' };
  APP.profilo = { id: APP.user.id, nome: 'Ospite', ruolo: 'utente' };
  APP.viaggi = []; APP.tab = 'nuovo'; render();
};

window.doLogout = async function () {
  await sb.auth.signOut();
  APP.user = null; APP.profilo = null; APP.viaggi = []; APP.utenti = []; APP.team = [];
  APP.tab = 'nuovo'; APP.alert = null; render();
};

window.doRegistrati = async function () {
  const nome = val('r-nome').trim(), cognome = val('r-cognome').trim(), pass = val('r-pass'), pass2 = val('r-pass2');
  if (!nome) { APP.alert = { msg: 'Inserisci almeno il nome', tipo: 'err' }; render(); return; }
  if (!pass || pass.length < 6) { APP.alert = { msg: 'Password di almeno 6 caratteri', tipo: 'err' }; render(); return; }
  if (pass !== pass2) { APP.alert = { msg: 'Le password non coincidono', tipo: 'err' }; render(); return; }
  const email = generaEmail(nome, cognome);
  $('app').innerHTML = '<div class="loading"><div class="spinner"></div>Creazione account...</div>';
  const nomeCompleto = nome + ' ' + cognome;
  const { data, error } = await sb.auth.signUp({
    email,
    password: pass,
    options: { data: { nome: nomeCompleto } }
  });
  if (error) { APP.alert = { msg: 'Errore: ' + error.message, tipo: 'err' }; render(); return; }
  // Inserisce il profilo esplicitamente (nel caso il trigger non sia attivo)
  await sb.from('profili').upsert({ id: data.user.id, nome: nomeCompleto, ruolo: 'utente' });
  APP.regResult = { email, pass }; APP.alert = null; render();
};

// ═══════════════════════════════════════════
//  ACTIONS — PROFILO
// ═══════════════════════════════════════════
window.salvaProfilo = async function () {
  const nome = val('p-nome').trim(), cognome = val('p-cognome').trim(), pass = val('p-pass');
  if (!nome) { showAlert('Inserisci almeno il nome', 'err'); return; }
  const nomeCompleto = cognome ? nome + ' ' + cognome : nome;
  await sb.from('profili').update({ nome: nomeCompleto }).eq('id', APP.user.id);
  if (pass && pass.length >= 6) await sb.auth.updateUser({ password: pass });
  APP.profilo.nome = nomeCompleto;
  showAlert('✓ Profilo aggiornato', 'ok');
};

// ═══════════════════════════════════════════
//  ACTIONS — VIAGGI
// ═══════════════════════════════════════════
window.iniziaViaggio = function () {
  const nome = val('f-nome').trim(), cognome = val('f-cognome').trim(), utilizzo = val('f-utilizzo').trim();
  const km_i = parseFloat(val('f-kmi')), ritiro = val('f-ritiro');
  if (!nome) { showAlert('Inserisci almeno il nome', 'err'); return; }
  if (!utilizzo) { showAlert('Inserisci utilizzo/destinazione', 'err'); return; }
  if (!km_i) { showAlert('Inserisci i km iniziali', 'err'); return; }
  if (!ritiro) { showAlert('Inserisci data e ora di ritiro', 'err'); return; }
  APP.viaggioInCorso = { nome, cognome, utilizzo, km_i, ritiro };
  render();
};

window.completaViaggio = async function () {
  const vp = APP.viaggioInCorso; if (!vp) return;
  const km_f = parseFloat(val('f-kmf')), riconsegna = val('f-riconsegna'), pieno = val('f-pieno');
  if (!km_f || km_f <= vp.km_i) { showAlert('Km finali devono essere maggiori degli iniziali', 'err'); return; }
  if (!riconsegna) { showAlert('Inserisci data e ora di riconsegna', 'err'); return; }
  if (!pieno) { showAlert('Indica se è stato fatto il pieno', 'err'); return; }
  const { error } = await sb.from('viaggi').insert({ uid: APP.user.id, nome: vp.nome, cognome: vp.cognome, utilizzo: vp.utilizzo, km_i: vp.km_i, km_f, ritiro: vp.ritiro, riconsegna, tariffa: null, pieno: pieno === 'si', approvato: false });
  if (error) { showAlert('Errore salvataggio: ' + error.message, 'err'); return; }
  APP.viaggioInCorso = null;
  await loadViaggi();
  showAlert('✓ Viaggio completato e registrato!', 'ok'); APP.tab = 'storico'; render();
};

window.annullaViaggio = function () {
  if (!confirm('Annullare il viaggio in corso?')) return;
  APP.viaggioInCorso = null; render();
};

window.openEditViaggio = id => { APP.modal = 'edit-viaggio'; APP.editId = id; render(); };
window.saveEditViaggio = async function () {
  const v = APP.viaggi.find(x => x.id === APP.editId); if (!v) return;
  const updates = { nome: val('m-nome'), cognome: val('m-cognome'), utilizzo: val('m-utilizzo'), km_i: parseFloat(val('m-kmi')), km_f: parseFloat(val('m-kmf')) || null, ritiro: val('m-ritiro') || null, riconsegna: val('m-riconsegna') || null, tariffa: val('m-tariffa') || null, pieno: $('m-pieno') && $('m-pieno').classList.contains('on'), approvato: $('m-approvato') && $('m-approvato').classList.contains('on') };
  const { error } = await sb.from('viaggi').update(updates).eq('id', APP.editId);
  if (error) { showAlert('Errore: ' + error.message, 'err'); return; }
  await loadViaggi(); APP.modal = null; APP.editId = null; showAlert('✓ Viaggio aggiornato', 'ok');
};
window.deleteViaggio = async id => {
  if (!confirm('Eliminare questo viaggio?')) return;
  await sb.from('viaggi').delete().eq('id', id);
  await loadViaggi(); render();
};
window.setTariffaRapida = async function (id, tariffa) {
  if (!tariffa) return;
  await sb.from('viaggi').update({ tariffa, approvato: true }).eq('id', id);
  await loadViaggi(); renderInner();
};

// ═══════════════════════════════════════════
//  ACTIONS — UTENTI
// ═══════════════════════════════════════════
window.openAddUtente = () => { APP.modal = 'add-utente'; render(); };
window.saveAddUtente = async function () {
  const nome = val('m-unome').trim(), cognome = val('m-ucognome').trim(), pass = val('m-upass'), ruolo = val('m-uruolo');
  let email = val('m-uemail').trim();
  if (!nome || !pass) { showAlert('Compila almeno nome e password', 'err'); return; }
  if (!email) email = generaEmail(nome, cognome || '');
  const { data, error } = await sb.auth.admin ? 
    // Se disponibile usa admin API
    { data: null, error: { message: 'usa signup normale' } } :
    await sb.auth.signUp({ email, password: pass });
  // Fallback: crea utente tramite signup e poi aggiorna profilo
  const { data: sd, error: se } = await sb.auth.signUp({ email, password: pass });
  if (se) { showAlert('Errore: ' + se.message, 'err'); return; }
  await sb.from('profili').insert({ id: sd.user.id, nome: nome + ' ' + cognome, ruolo });
  await loadUtenti(); APP.modal = null; showAlert('✓ Utente aggiunto (' + email + ')', 'ok'); render();
};
window.openEditUtente = id => { APP.modal = 'edit-utente'; APP.editId = id; render(); };
window.saveEditUtente = async function () {
  const u = APP.utenti.find(x => x.id === APP.editId); if (!u) return;
  const nome = val('m-unome').trim(), cognome = val('m-ucognome').trim(), ruolo = val('m-uruolo');
  if (!nome || !cognome) { showAlert('Compila nome e cognome', 'err'); return; }
  await sb.from('profili').update({ nome: nome + ' ' + cognome, ruolo }).eq('id', APP.editId);
  await loadUtenti(); APP.modal = null; showAlert('✓ Utente aggiornato', 'ok'); render();
};
window.deleteUtente = async id => {
  if (!confirm('Eliminare questo utente?')) return;
  await sb.from('profili').delete().eq('id', id);
  await loadUtenti(); render();
};

// ═══════════════════════════════════════════
//  ACTIONS — TEAM
// ═══════════════════════════════════════════
window.openAddTeam = async () => {
  if (APP.utenti.length === 0) await loadUtenti();
  APP.modal = 'add-team'; render();
};
window.saveAddTeam = async function () {
  const nome = val('m-tnome').trim(), desc = val('m-tdesc').trim(), resp = val('m-tresp');
  if (!nome) { showAlert('Inserisci il nome del team', 'err'); return; }
  const { error } = await sb.from('team').insert({ nome, descrizione: desc, responsabile_id: resp || null });
  if (error) { showAlert('Errore: ' + error.message, 'err'); return; }
  await loadTeam(); APP.modal = null; showAlert('✓ Team creato', 'ok'); render();
};
window.openEditTeam = async id => {
  if (APP.utenti.length === 0) await loadUtenti();
  APP.modal = 'edit-team'; APP.editId = id; render();
};
window.saveEditTeam = async function () {
  const t = APP.team.find(x => x.id === APP.editId); if (!t) return;
  const { error } = await sb.from('team').update({ nome: val('m-tnome').trim(), descrizione: val('m-tdesc').trim(), responsabile_id: val('m-tresp') || null }).eq('id', APP.editId);
  if (error) { showAlert('Errore: ' + error.message, 'err'); return; }
  await loadTeam(); APP.modal = null; showAlert('✓ Team aggiornato', 'ok'); render();
};
window.deleteTeam = async id => {
  if (!confirm('Eliminare questo team?')) return;
  await sb.from('team').delete().eq('id', id);
  await loadTeam(); render();
};

// ═══════════════════════════════════════════
//  ACTIONS — CONFIG
// ═══════════════════════════════════════════
window.saveLogo = async function () {
  const url = val('logo-url');
  await sb.from('config').upsert({ chiave: 'logo_url', valore: url });
  APP.logoUrl = url; APP.cfg.logo_url = url; showAlert('✓ Logo aggiornato', 'ok');
};
window.saveTariffe = async function () {
  const aggiornamenti = [
    { chiave: 'tariffa_scout_giorno', valore: String(parseFloat(val('t-scout-g')) || 20) },
    { chiave: 'tariffa_scout_km_inclusi', valore: String(parseFloat(val('t-scout-km')) || 100) },
    { chiave: 'tariffa_scout_extra_ogni', valore: String(parseFloat(val('t-scout-ogi')) || 50) },
    { chiave: 'tariffa_scout_extra_costo', valore: String(parseFloat(val('t-scout-ext')) || 5) },
    { chiave: 'tariffa_altro_giorno', valore: String(parseFloat(val('t-altro-g')) || 30) },
    { chiave: 'tariffa_altro_km_inclusi', valore: String(parseFloat(val('t-altro-km')) || 100) },
    { chiave: 'tariffa_altro_extra_ogni', valore: String(parseFloat(val('t-altro-ogi')) || 50) },
    { chiave: 'tariffa_altro_extra_costo', valore: String(parseFloat(val('t-altro-ext')) || 5) },
    { chiave: 'carburante_consumo', valore: String(parseFloat(val('t-cons')) || 8) },
    { chiave: 'carburante_prezzo', valore: String(parseFloat(val('t-prezzo')) || 2.5) },
  ];
  await sb.from('config').upsert(aggiornamenti);
  await loadConfig(); showAlert('✓ Tariffe salvate', 'ok');
};

// ═══════════════════════════════════════════
//  AVVIO
// ═══════════════════════════════════════════
(async () => {
  // Controlla se c'è già una sessione attiva
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    APP.user = session.user;
    const { data: profilo } = await sb.from('profili').select('*').eq('id', APP.user.id).single();
    APP.profilo = profilo;
    await loadAll();
  }
  render();

  // Ascolta cambi di sessione
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') { APP.user = null; APP.profilo = null; render(); }
  });
})();
</script>
</body>
</html>
