<!DOCTYPE html>
<html lang="it">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3693ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Furgone AR7</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blu:#3693ff;--blu-dark:#1a7aee;--verde:#007d04;--verde-dark:#005a03;--grigio-bg:#f4f5f8;--testo:#1a1a2e;--testo2:#555577;--bordo:#e0e0f0;--danger:#c0392b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--grigio-bg);color:var(--testo);min-height:100vh;font-size:15px}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:var(--grigio-bg)}
.topbar{background:var(--blu);color:#fff;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo-circle{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.logo-circle img{width:100%;height:100%;object-fit:contain}
.logo-placeholder{font-size:11px;font-weight:700;color:var(--blu);text-align:center;line-height:1.1}
.badge-role{font-size:10px;background:var(--verde);color:#fff;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}
.content{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:14px;border:0.5px solid var(--bordo);padding:16px;box-shadow:0 1px 4px rgba(0,38,255,.05)}
.card-title{font-size:13px;font-weight:600;color:var(--testo2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
label{font-size:13px;color:var(--testo2);margin-bottom:4px;display:block}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--bordo);border-radius:9px;font-size:15px;color:#000;background:#fff;outline:none;transition:border .2s}
input:focus,select:focus{border-color:var(--blu)}
input::placeholder{color:#3d3d3d}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.btn{width:100%;padding:13px;border:none;border-radius:11px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blu);color:#fff}.btn-primary:hover{background:var(--blu-dark)}
.btn-success{background:var(--verde);color:#fff}.btn-success:hover{background:var(--verde-dark)}
.btn-outline{background:transparent;color:var(--blu);border:1.5px solid var(--blu)}
.btn-sm{padding:7px 14px;font-size:13px;width:auto;border-radius:8px}
.btn-danger{background:var(--danger);color:#fff}
.bottom-nav{display:flex;background:#fff;border-top:0.5px solid var(--bordo);padding:6px 0 10px;position:sticky;bottom:0;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 2px;border:none;background:none;color:var(--testo2);font-size:9px;transition:color .2s;line-height:1.2}
.nav-item.active{color:var(--blu)}
.nav-icon{font-size:19px;line-height:1}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--grigio-bg);border-radius:10px;padding:12px;text-align:center;border:0.5px solid var(--bordo)}
.stat-val{font-size:22px;font-weight:700;color:var(--blu)}
.stat-lbl{font-size:11px;color:var(--testo2);margin-top:2px}
.entry-item{border-bottom:0.5px solid var(--bordo);padding:12px 0;display:flex;flex-direction:column;gap:4px}
.entry-item:last-child{border-bottom:none}
.entry-head{display:flex;justify-content:space-between;align-items:center}
.entry-name{font-weight:600;font-size:15px}
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:8px;font-weight:600}
.tag-ar7{background:#ddeeff;color:#1a6acc}.tag-scout{background:#d4edda;color:#007d04}.tag-altro{background:#fef3cd;color:#856404}.tag-anon{background:#f0f0f0;color:#666}
.costo-badge{font-size:14px;font-weight:700;color:var(--verde);background:#eafbe6;padding:3px 10px;border-radius:8px}
.costo-box{background:#eafbe6;border-radius:10px;padding:12px;margin-top:8px;border:1px solid #b8e6ba}
.costo-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--testo2)}
.costo-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding-top:8px;margin-top:6px;border-top:1px solid #b8e6ba;color:var(--verde)}
.section-title{font-size:18px;font-weight:700;color:var(--testo);margin-bottom:4px}
.sub-title{font-size:13px;color:var(--testo2);margin-bottom:12px}
.empty-state{text-align:center;padding:30px 16px;color:var(--testo2)}
.empty-icon{font-size:40px;margin-bottom:8px}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--blu)}
.login-card{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,38,255,.18)}
.login-logo{width:72px;height:72px;border-radius:50%;background:var(--blu);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;overflow:hidden}
.login-logo img{width:100%;height:100%;object-fit:contain}
.login-title{text-align:center;font-size:20px;font-weight:700;color:var(--blu);margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--testo2);margin-bottom:20px}
.divider{text-align:center;color:var(--testo2);font-size:12px;margin:10px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:0.5px;background:var(--bordo)}
.divider::before{left:0}.divider::after{right:0}
.admin-tab-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.admin-tab{padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;border:1px solid var(--bordo);color:var(--testo2);white-space:nowrap;font-weight:500}
.admin-tab.active{background:var(--blu);color:#fff;border-color:var(--blu)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 18px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--testo2);line-height:1}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bordo)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bordo);position:relative;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:var(--verde)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:10px}
.alert-err{background:#fde8e8;color:var(--danger);border:1px solid #f5c6c6}
.alert-ok{background:#e8f5e9;color:var(--verde);border:1px solid #c8e6c9}
.user-chip{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--grigio-bg);border-radius:10px;margin-bottom:8px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--blu);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-info{flex:1}.user-name{font-size:14px;font-weight:600}.user-role{font-size:11px;color:var(--testo2)}
.tariffa-info{background:#f0f6ff;border-radius:10px;padding:10px 12px;font-size:12px;color:var(--testo2);margin-top:6px;border:1px solid #cce0ff;line-height:1.6}
.reg-result{background:#eafbe6;border-radius:12px;padding:16px;border:1px solid #b8e6ba;margin-bottom:12px}
.reg-result-title{font-size:13px;color:var(--verde);font-weight:600;margin-bottom:8px}
.reg-credential{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid #b8e6ba}
.reg-credential-label{font-size:11px;color:var(--testo2);margin-bottom:2px}
.reg-credential-value{font-size:16px;font-weight:700;color:var(--testo);font-family:monospace;word-break:break-all}
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pill{padding:5px 14px;border-radius:20px;border:1.5px solid var(--bordo);font-size:13px;cursor:pointer;background:#fff;color:var(--testo);transition:all .2s;white-space:nowrap}
.pill.sel{background:var(--blu);color:#fff;border-color:var(--blu)}
canvas{display:block;width:100%!important}
.chart-wrap{position:relative;width:100%;margin:0 auto}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--testo2)}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
const CFG={
  prezzoCarburante:2.5,consumoPer100km:8,
  tariffe:{
    AR7:{giornoBase:0,kmInclusi:0,extraOgni:50,extraCosto:0,pieno:true,nome:'AR7'},
    Scout:{giornoBase:20,kmInclusi:100,extraOgni:50,extraCosto:5,pieno:true,nome:'Altri Scout'},
    Altro:{giornoBase:30,kmInclusi:100,extraOgni:50,extraCosto:5,pieno:true,nome:'Altro'},
  }
};
const APP={
  state:{view:'login',subview:null,user:null,tab:'nuovo',adminTab:'panoramica',modal:null,editId:null,logoUrl:null,filterUser:'',filterTariffa:'',alert:null,regResult:null},
  data:{
    utenti:[
      {id:'u1',nome:'Admin Principale',email:'admin@ar7.it',pass:'admin123',ruolo:'admin'},
      {id:'u2',nome:'Gestore Sistema',email:'gestore@ar7.it',pass:'gestore123',ruolo:'gestore'},
      {id:'u3',nome:'Marco Rossi',email:'marco@ar7.it',pass:'pass123',ruolo:'utente'},
      {id:'u4',nome:'Laura Bianchi',email:'laura@ar7.it',pass:'pass123',ruolo:'utente'},
    ],
    team:[
      {id:'t1',nome:'Reparto Esploratori',responsabile:'u3',descrizione:'Ragazzi 12-16 anni'},
      {id:'t2',nome:'Branco Lupi',responsabile:'u4',descrizione:'Bambini 8-12 anni'},
    ],
    viaggi:[
      {id:'v1',uid:'u3',nome:'Marco',cognome:'Rossi',utilizzo:'Campo estivo Pratomagno',kmI:12450,kmF:12580,ritiro:'2025-06-10T08:00',riconsegna:'2025-06-11T18:30',tariffa:'AR7',pieno:true,approvato:true,ts:1718006400000},
      {id:'v2',uid:'u4',nome:'Laura',cognome:'Bianchi',utilizzo:'Riunione Zona Arezzo',kmI:12580,kmF:12620,ritiro:'2025-06-12T14:00',riconsegna:'2025-06-12T16:00',tariffa:'Scout',pieno:false,approvato:true,ts:1718179200000},
      {id:'v3',uid:null,nome:'Ospite',cognome:'Scout',utilizzo:'Uscita domenicale',kmI:12620,kmF:12695,ritiro:'2025-06-15T09:00',riconsegna:'2025-06-15T17:00',tariffa:'Altro',pieno:true,approvato:true,ts:1718438400000},
      {id:'v4',uid:'u3',nome:'Marco',cognome:'Rossi',utilizzo:'Attività invernale',kmI:12695,kmF:12780,ritiro:'2025-07-02T09:00',riconsegna:'2025-07-02T18:00',tariffa:'AR7',pieno:false,approvato:true,ts:1720908000000},
      {id:'v5',uid:'u4',nome:'Laura',cognome:'Bianchi',utilizzo:'Campo invernale',kmI:12780,kmF:12950,ritiro:'2025-08-05T08:00',riconsegna:'2025-08-07T18:00',tariffa:'Scout',pieno:true,approvato:true,ts:1722844800000},
    ]
  }
};

let chartInstances={};

function save(){try{window.storage&&window.storage.set('ar7_v4',JSON.stringify({data:APP.data,cfg:CFG,logo:APP.state.logoUrl})).catch(()=>{})}catch(e){}}
function load(){try{window.storage&&window.storage.get('ar7_v4').then(r=>{if(r&&r.value){const d=JSON.parse(r.value);if(d.data)APP.data=d.data;if(d.cfg){Object.assign(CFG.tariffe,d.cfg.tariffe||{});if(d.cfg.prezzoCarburante)CFG.prezzoCarburante=d.cfg.prezzoCarburante;if(d.cfg.consumoPer100km)CFG.consumoPer100km=d.cfg.consumoPer100km;}if(d.logo)APP.state.logoUrl=d.logo;}render()}).catch(()=>{})}catch(e){}}

const $=id=>document.getElementById(id);
const val=id=>{const el=$(id);return el?el.value:''};
function uid(){return 'x'+Math.random().toString(36).substr(2,9)}
function fmtDate(s){if(!s)return '-';const d=new Date(s);return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
function giorni(ritiro,riconsegna){if(!ritiro||!riconsegna)return 1;const ms=new Date(riconsegna)-new Date(ritiro);return Math.max(1,Math.ceil(ms/(1000*60*60*24)))}
function isAdmin(u){return u&&(u.ruolo==='admin'||u.ruolo==='gestore')}
function isGestore(u){return u&&u.ruolo==='gestore'}

function generaEmail(nome,cognome,escludiId){
  const base=(nome.trim().toLowerCase()+'.'+cognome.trim().toLowerCase()).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'.');
  const esistenti=APP.data.utenti.filter(u=>!escludiId||u.id!==escludiId).map(u=>u.email.toLowerCase());
  const c=base+'@ar7.it';if(!esistenti.includes(c))return c;
  let i=2;while(esistenti.includes(base+i+'@ar7.it'))i++;return base+i+'@ar7.it';
}
function calcolaCostoDettaglio(v){
  if(!v.tariffa||!v.approvato)return null;
  const t=CFG.tariffe[v.tariffa];if(!t)return null;
  const km=Math.max(0,(v.kmF||0)-(v.kmI||0));
  const gg=giorni(v.ritiro,v.riconsegna);
  const base=t.giornoBase*gg;
  let kmExtra=0;
  if(t.kmInclusi>0){const extra=Math.max(0,km-t.kmInclusi*gg);kmExtra=Math.ceil(extra/t.extraOgni)*t.extraCosto;}
  let carburante=0;
  if(!v.pieno){carburante=(km/100)*CFG.consumoPer100km*CFG.prezzoCarburante;}
  return{base,kmExtra,carburante,totale:base+kmExtra+carburante,km,gg};
}
function showAlert(msg,tipo='ok',dur=3000){APP.state.alert={msg,tipo};render();setTimeout(()=>{APP.state.alert=null;render()},dur)}
function tagTariffa(t){
  if(!t)return `<span class="tag tag-anon">N/D</span>`;
  if(t==='AR7')return `<span class="tag tag-ar7">AR7</span>`;
  if(t==='Scout')return `<span class="tag tag-scout">Altri Scout</span>`;
  return `<span class="tag tag-altro">Altro</span>`;
}
function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});chartInstances={};}

/* ========== RENDER ========== */
function render(){
  destroyCharts();
  const app=$('app');if(!app)return;
  if(!APP.state.user){
    if(APP.state.subview==='registrati'){app.innerHTML=renderRegistrati();bindRegistrati();return;}
    app.innerHTML=renderLogin();bindLogin();return;
  }
  app.innerHTML=`<div style="display:flex;flex-direction:column;min-height:100vh">${renderTopbar()}<div class="content" id="main-content">${renderAlert()}${renderMain()}</div>${renderBottomNav()}</div>${APP.state.modal?renderModal():''}`;
  bindMain();
  if(APP.state.tab==='statistiche') setTimeout(initCharts,50);
}

function renderAlert(){if(!APP.state.alert)return '';return `<div class="alert alert-${APP.state.alert.tipo==='ok'?'ok':'err'}">${APP.state.alert.msg}</div>`;}

function renderTopbar(){
  const u=APP.state.user;
  const lc=APP.state.logoUrl?`<img src="${APP.state.logoUrl}" alt="logo">`:`<div class="logo-placeholder">AR7</div>`;
  return `<div class="topbar"><div style="display:flex;align-items:center;gap:8px;flex:1"><div class="logo-circle">${lc}</div><div><div style="font-size:15px;font-weight:700">Furgone Scout AR7</div><div style="font-size:11px;opacity:.8">Arezzo 7</div></div></div><span class="badge-role">${u.ruolo}</span><button onclick="doLogout()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 4px 4px 10px">⏏</button></div>`;
}

function renderBottomNav(){
  const u=APP.state.user;
  let tabs;
  if(isGestore(u)){
    tabs=[{id:'nuovo',icon:'➕',lbl:'Nuovo viaggio'},{id:'storico',icon:'📋',lbl:'Tutti i viaggi'},{id:'admin',icon:'📊',lbl:'Riepilogo'},{id:'statistiche',icon:'📈',lbl:'Statistiche'},{id:'impostazioni',icon:'⚙️',lbl:'Gestione'}];
  } else if(isAdmin(u)){
    tabs=[{id:'nuovo',icon:'➕',lbl:'Nuovo viaggio'},{id:'storico',icon:'📋',lbl:'Tutti i viaggi'},{id:'admin',icon:'📊',lbl:'Riepilogo'},{id:'statistiche',icon:'📈',lbl:'Statistiche'},{id:'impostazioni',icon:'⚙️',lbl:'Impostazioni'}];
  } else {
    tabs=[{id:'nuovo',icon:'➕',lbl:'Nuovo viaggio'},{id:'storico',icon:'📋',lbl:'I miei viaggi'},{id:'impostazioni',icon:'⚙️',lbl:'Impostazioni'}];
  }
  return `<div class="bottom-nav">${tabs.map(t=>`<button class="nav-item ${APP.state.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><span class="nav-icon">${t.icon}</span>${t.lbl}</button>`).join('')}</div>`;
}

function renderMain(){
  switch(APP.state.tab){
    case 'nuovo':return renderNuovo();
    case 'storico':return renderStorico();
    case 'admin':return renderAdmin();
    case 'statistiche':return renderStatistiche();
    case 'impostazioni':return renderImpostazioni();
    default:return renderNuovo();
  }
}

/* ---- NUOVO ---- */
function renderNuovo(){
  const u=APP.state.user;
  const pn=u&&!u.anonimo?u.nome.split(' ')[0]:'';
  const pc=u&&!u.anonimo&&u.nome.includes(' ')?u.nome.split(' ').slice(1).join(' '):'';
  const vp=APP.state.viaggioInCorso;
  return `
  <div class="section-title">Nuovo viaggio</div>
  <div class="sub-title">Registra l'utilizzo del furgone in due fasi</div>

  <!-- FASE 1 -->
  <div class="card" style="${vp?'opacity:.55;pointer-events:none':''}">
    <div class="card-title" style="display:flex;align-items:center;gap:8px">
      <span style="background:var(--blu);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">1</span>
      Inizio viaggio
    </div>
    <div class="row2">
      <div class="field"><label>Nome</label><input id="f-nome" value="${vp?vp.nome:pn}"/></div>
      <div class="field"><label>Cognome</label><input id="f-cognome" value="${vp?vp.cognome:pc}"/></div>
    </div>
    <div class="field" style="margin-top:10px"><label>Utilizzo / Destinazione</label><input id="f-utilizzo" value="${vp?vp.utilizzo:''}" placeholder="es. Riunione reparto..."/></div>
    <div class="row2" style="margin-top:10px">
      <div class="field"><label>Km iniziali</label><input id="f-kmi" type="number" value="${vp?vp.kmI:''}"/></div>
      <div class="field"><label>Data e ora ritiro</label><input id="f-ritiro" type="datetime-local" value="${vp?vp.ritiro:''}"/></div>
    </div>
    ${!vp?`<button class="btn btn-primary" style="margin-top:14px" onclick="iniziaViaggio()">🚐 Inizia viaggio</button>`:`<div style="margin-top:12px;background:#eafbe6;border-radius:9px;padding:10px 12px;font-size:13px;color:var(--verde);font-weight:600">✓ Viaggio in corso — completa la fase 2</div>`}
  </div>

  <!-- FASE 2 -->
  <div class="card" style="${!vp?'opacity:.45;pointer-events:none':''}">
    <div class="card-title" style="display:flex;align-items:center;gap:8px">
      <span style="background:${vp?'var(--verde)':'#bbb'};color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">2</span>
      Fine viaggio
    </div>
    ${vp?`<div style="background:var(--grigio-bg);border-radius:9px;padding:10px 12px;font-size:13px;margin-bottom:12px;color:var(--testo2)">
      <b>${vp.nome} ${vp.cognome}</b> · ${vp.utilizzo}<br>
      Km partenza: <b>${vp.kmI}</b> · Ritiro: <b>${fmtDate(vp.ritiro)}</b>
    </div>`:''}

function renderAdminPanoramica(){
  const viaggi=APP.data.viaggi;

    <div class="stat-card"><div class="stat-val" style="color:#e67e22">${kmAttuali.toLocaleString('it-IT')}</div><div class="stat-lbl">Km attuali</div></div>
    <div class="stat-card"><div class="stat-val">${kmMedioMensile.toLocaleString('it-IT')}</div><div class="stat-lbl">Km medi mensili</div></div>

function initCharts(){
  if(typeof Chart==='undefined')return;
  const viaggi=APP.data.viaggi;

  // Torta tariffe (escludi N/D)
  const tarCounts={AR7:0,Scout:0,Altro:0};
  viaggi.filter(v=>v.tariffa&&tarCounts[v.tariffa]!==undefined).forEach(v=>tarCounts[v.tariffa]++);
  const tarColors=['#a8ccff','#7ecb82','#fdd88a'];
  const tarKeys=Object.keys(tarCounts);
  const tarVals=tarKeys.map(k=>tarCounts[k]);
  buildPie('chart-tariffe','legend-tariffe',tarKeys.map(k=>k==='Scout'?'Altri Scout':k),tarVals,tarColors);

  // Torta pieno
  const conPieno=viaggi.filter(v=>v.pieno).length;
  const senzaPieno=viaggi.length-conPieno;
  buildPie('chart-pieno','legend-pieno',['Sì','No'],[conPieno,senzaPieno],['#7ecb82','#f4a0a0']);

  // Lineare km nel tempo
  const sorted=viaggi.filter(v=>v.kmF).sort((a,b)=>a.ts-b.ts);
  const kmLabels=sorted.map(v=>{const d=new Date(v.ts);return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})});
  const kmVals=sorted.map(v=>v.kmF);
  const c3=$('chart-km');if(!c3)return;
  chartInstances['km']=new Chart(c3,{
    type:'line',
    data:{labels:kmLabels,datasets:[{label:'Km contachilometri',data:kmVals,borderColor:'#3693ff',backgroundColor:'rgba(54,147,255,.10)',borderWidth:2,pointBackgroundColor:'#3693ff',pointRadius:4,fill:true,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#888'}},y:{grid:{color:'#f0f0f0'},ticks:{font:{size:11},color:'#888'}}}}
  });
}

function buildPie(canvasId,legendId,labels,data,colors){
  const c=$(canvasId);if(!c)return;
  const tot=data.reduce((a,b)=>a+b,0);
  chartInstances[canvasId]=new Chart(c,{
    type:'pie',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{
      responsive:true,maintainAspectRatio:true,aspectRatio:1,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`  ${ctx.label}: ${ctx.parsed} (${tot?Math.round(ctx.parsed/tot*100):0}%)`}},
        datalabels:{
          color:'#333',
          font:{size:12,weight:'600'},
          formatter:(value,ctx)=>{
            const pct=tot?Math.round(value/tot*100):0;
            if(pct<7)return '';
            return labels[ctx.dataIndex]+'\n'+pct+'%';
          },
          textAlign:'center',
          display:true
        }
      }
    },
    plugins:[ChartDataLabels]
  });
  const leg=$(legendId);if(leg)leg.innerHTML='';
}

/* ---- MODALI ---- */
function renderModal(){
  const m=APP.state.modal;
  if(m==='edit-viaggio')return renderModalEditViaggio();
  if(m==='add-utente')return renderModalAddUtente();
  if(m==='edit-utente')return renderModalEditUtente();
  if(m==='add-team')return renderModalAddTeam();
  if(m==='edit-team')return renderModalEditTeam();
  return '';
}
function renderModalEditViaggio(){
  const v=APP.data.viaggi.find(x=>x.id===APP.state.editId);if(!v)return '';
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">✏️ Modifica viaggio</div>
    <div class="row2" style="margin-bottom:8px">
      <div class="field"><label>Nome</label><input id="m-nome" value="${v.nome}"/></div>
      <div class="field"><label>Cognome</label><input id="m-cognome" value="${v.cognome}"/></div>
    </div>
    <div class="field" style="margin-bottom:8px"><label>Utilizzo</label><input id="m-utilizzo" value="${v.utilizzo}"/></div>
    <div class="row2" style="margin-bottom:8px">
      <div class="field"><label>Km iniziali</label><input id="m-kmi" type="number" value="${v.kmI}"/></div>
      <div class="field"><label>Km finali</label><input id="m-kmf" type="number" value="${v.kmF}"/></div>
    </div>
    <div class="row2" style="margin-bottom:8px">
      <div class="field"><label>Ritiro</label><input id="m-ritiro" type="datetime-local" value="${v.ritiro||''}"/></div>
      <div class="field"><label>Riconsegna</label><input id="m-riconsegna" type="datetime-local" value="${v.riconsegna||''}"/></div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>⚡ Tariffa</label>
      <select id="m-tariffa">
        <option value="">Nessuna (da definire)</option>
        <option ${v.tariffa==='AR7'?'selected':''} value="AR7">AR7 — gratuita, solo pieno</option>
        <option ${v.tariffa==='Scout'?'selected':''} value="Scout">Altri Scout — €${CFG.tariffe.Scout.giornoBase}/g + km</option>
        <option ${v.tariffa==='Altro'?'selected':''} value="Altro">Altro — €${CFG.tariffe.Altro.giornoBase}/g + km</option>
      </select>
    </div>
    <div class="switch-row" style="margin-bottom:6px">
      <span style="font-size:14px">⛽ Pieno effettuato</span>
      <button class="toggle ${v.pieno?'on':''}" id="m-pieno" onclick="this.classList.toggle('on')"></button>
    </div>
    <div class="switch-row" style="margin-bottom:14px">
      <span style="font-size:14px">✅ Approvato</span>
      <button class="toggle ${v.approvato?'on':''}" id="m-approvato" onclick="this.classList.toggle('on')"></button>
    </div>
    <button class="btn btn-success" onclick="saveEditViaggio()">Salva modifiche</button>
  </div></div>`;
}
function renderModalAddUtente(){
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">👤 Nuovo utente</div>
    <div class="row2" style="margin-bottom:8px">
      <div class="field"><label>Nome</label><input id="m-unome"/></div>
      <div class="field"><label>Cognome</label><input id="m-ucognome"/></div>
    </div>
    <div class="field" style="margin-bottom:4px"><label>Email (opzionale)</label><input id="m-uemail" placeholder="lascia vuoto per auto-generare"/></div>
    <div style="font-size:11px;color:var(--testo2);margin-bottom:8px">Auto: nome.cognome@ar7.it</div>
    <div class="field" style="margin-bottom:8px"><label>Password</label><input id="m-upass" type="password"/></div>
    <div class="field" style="margin-bottom:14px"><label>Ruolo</label>
      <select id="m-uruolo"><option value="utente">Utente</option><option value="admin">Admin</option><option value="gestore">Gestore</option></select>
    </div>
    <button class="btn btn-success" onclick="saveAddUtente()">Aggiungi utente</button>
  </div></div>`;
}
function renderModalEditUtente(){
  const u=APP.data.utenti.find(x=>x.id===APP.state.editId);if(!u)return '';
  const np=u.nome.split(' ')[0]||'';const cp=u.nome.includes(' ')?u.nome.split(' ').slice(1).join(' '):'';
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">✏️ Modifica utente</div>
    <div class="row2" style="margin-bottom:8px">
      <div class="field"><label>Nome</label><input id="m-unome" value="${np}"/></div>
      <div class="field"><label>Cognome</label><input id="m-ucognome" value="${cp}"/></div>
    </div>
    <div class="field" style="margin-bottom:8px"><label>Email</label><input id="m-uemail" value="${u.email}"/></div>
    <div class="field" style="margin-bottom:8px"><label>Nuova password</label><input id="m-upass" type="password" placeholder="lascia vuoto per non cambiare"/></div>
    <div class="field" style="margin-bottom:14px"><label>Ruolo</label>
      <select id="m-uruolo">
        <option ${u.ruolo==='utente'?'selected':''} value="utente">Utente</option>
        <option ${u.ruolo==='admin'?'selected':''} value="admin">Admin</option>
        <option ${u.ruolo==='gestore'?'selected':''} value="gestore">Gestore</option>
      </select>
    </div>
    <button class="btn btn-success" onclick="saveEditUtente()">Salva modifiche</button>
  </div></div>`;
}
function renderModalAddTeam(){
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">🏕 Nuovo team</div>
    <div class="field" style="margin-bottom:8px"><label>Nome team</label><input id="m-tnome"/></div>
    <div class="field" style="margin-bottom:8px"><label>Descrizione</label><input id="m-tdesc"/></div>
    <div class="field" style="margin-bottom:14px"><label>Responsabile</label>
      <select id="m-tresp">${APP.data.utenti.map(u=>`<option value="${u.id}">${u.nome}</option>`).join('')}</select>
    </div>
    <button class="btn btn-success" onclick="saveAddTeam()">Crea team</button>
  </div></div>`;
}
function renderModalEditTeam(){
  const t=APP.data.team.find(x=>x.id===APP.state.editId);if(!t)return '';
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">✏️ Modifica team</div>
    <div class="field" style="margin-bottom:8px"><label>Nome team</label><input id="m-tnome" value="${t.nome}"/></div>
    <div class="field" style="margin-bottom:8px"><label>Descrizione</label><input id="m-tdesc" value="${t.descrizione||''}"/></div>
    <div class="field" style="margin-bottom:14px"><label>Responsabile</label>
      <select id="m-tresp">${APP.data.utenti.map(u=>`<option value="${u.id}" ${t.responsabile===u.id?'selected':''}>${u.nome}</option>`).join('')}</select>
    </div>
    <button class="btn btn-success" onclick="saveEditTeam()">Salva modifiche</button>
  </div></div>`;
}

/* ---- BIND ---- */
function bindLogin(){const p=$('l-pass');if(p)p.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();})}
function bindRegistrati(){const p=$('r-pass2');if(p)p.addEventListener('keydown',e=>{if(e.key==='Enter')doRegistrati();})}
function bindMain(){
  const kmf=$('f-kmf');
  if(kmf&&APP.state.viaggioInCorso){
    const upd=()=>{const el=$('km-preview');if(!el)return;const d=parseFloat(kmf.value||0)-parseFloat(APP.state.viaggioInCorso.kmI||0);el.innerHTML=d>0?`<b>${d} km</b> percorsi`:''};
    kmf.addEventListener('input',upd);
  }
}
function renderInner(){const mc=$('main-content');if(mc){mc.innerHTML=renderAlert()+renderMain();bindMain();if(APP.state.tab==='statistiche')setTimeout(initCharts,50);}}

/* ---- ACTIONS ---- */
window.setTab=t=>{APP.state.tab=t;render()};
window.setAdminTab=t=>{APP.state.adminTab=t;render()};
window.closeModal=e=>{if(!e||e.target===e.currentTarget){APP.state.modal=null;APP.state.editId=null;render();}};
window.goRegistrati=()=>{APP.state.subview='registrati';APP.state.regResult=null;APP.state.alert=null;render()};
window.goLogin=()=>{APP.state.subview=null;APP.state.regResult=null;APP.state.alert=null;render()};

window.doLogin=function(){
  const email=val('l-email').trim().toLowerCase(),pass=val('l-pass');
  const u=APP.data.utenti.find(x=>x.email.toLowerCase()===email&&x.pass===pass);
  if(!u){APP.state.alert={msg:'Credenziali non valide',tipo:'err'};render();return;}
  APP.state.user=u;APP.state.alert=null;render();
};
window.doLoginConCredenziali=function(email,pass){
  const u=APP.data.utenti.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.pass===pass);
  if(!u)return;
  APP.state.user=u;APP.state.subview=null;APP.state.regResult=null;APP.state.alert=null;render();
};
window.doAnonimo=function(){APP.state.user={id:'anon-'+uid(),nome:'Ospite',email:'',ruolo:'utente',anonimo:true};render();};
window.doLogout=function(){destroyCharts();APP.state.user=null;APP.state.alert=null;render();};

window.doRegistrati=function(){
  const nome=val('r-nome').trim(),cognome=val('r-cognome').trim(),pass=val('r-pass'),pass2=val('r-pass2');
  if(!nome||!cognome){APP.state.alert={msg:'Inserisci nome e cognome',tipo:'err'};render();return;}
  if(!pass||pass.length<4){APP.state.alert={msg:'Password di almeno 4 caratteri',tipo:'err'};render();return;}
  if(pass!==pass2){APP.state.alert={msg:'Le password non coincidono',tipo:'err'};render();return;}
  const email=generaEmail(nome,cognome);
  APP.data.utenti.push({id:uid(),nome:nome+' '+cognome,email,pass,ruolo:'utente'});
  save();APP.state.regResult={email,pass};APP.state.alert=null;render();
};

window.salvaProfilo=function(){
  const u=APP.state.user;
  const nome=val('p-nome').trim(),cognome=val('p-cognome').trim(),pass=val('p-pass');
  if(!nome||!cognome){showAlert('Inserisci nome e cognome','err');return;}
  const idx=APP.data.utenti.findIndex(x=>x.id===u.id);
  if(idx>=0){APP.data.utenti[idx].nome=nome+' '+cognome;if(pass)APP.data.utenti[idx].pass=pass;APP.state.user={...APP.data.utenti[idx]};}
  else{u.nome=nome+' '+cognome;if(pass)u.pass=pass;}
  save();showAlert('✓ Profilo aggiornato','ok');render();
};

window.iniziaViaggio=function(){
  const nome=val('f-nome').trim(),cognome=val('f-cognome').trim(),utilizzo=val('f-utilizzo').trim();
  const kmi=parseFloat(val('f-kmi')),ritiro=val('f-ritiro');
  if(!nome||!cognome){showAlert('Inserisci nome e cognome','err');return;}
  if(!utilizzo){showAlert('Inserisci utilizzo/destinazione','err');return;}
  if(!kmi){showAlert('Inserisci i km iniziali','err');return;}
  if(!ritiro){showAlert('Inserisci data e ora di ritiro','err');return;}
  APP.state.viaggioInCorso={nome,cognome,utilizzo,kmI:kmi,ritiro};
  render();
};

window.completaViaggio=function(){
  const vp=APP.state.viaggioInCorso;if(!vp)return;
  const kmf=parseFloat(val('f-kmf')),riconsegna=val('f-riconsegna'),pieno=val('f-pieno');
  if(!kmf||kmf<=vp.kmI){showAlert('Km finali devono essere maggiori degli iniziali','err');return;}
  if(!riconsegna){showAlert('Inserisci data e ora di riconsegna','err');return;}
  if(!pieno){showAlert('Indica se è stato fatto il pieno','err');return;}
  APP.data.viaggi.push({id:uid(),uid:APP.state.user.id,nome:vp.nome,cognome:vp.cognome,utilizzo:vp.utilizzo,kmI:vp.kmI,kmF:kmf,ritiro:vp.ritiro,riconsegna,tariffa:null,pieno:pieno==='si',approvato:false,ts:Date.now()});
  APP.state.viaggioInCorso=null;
  save();showAlert('✓ Viaggio completato e registrato!','ok');APP.state.tab='storico';render();
};

window.annullaViaggio=function(){
  if(!confirm('Annullare il viaggio in corso? I dati inseriti andranno persi.'))return;
  APP.state.viaggioInCorso=null;render();
};

window.submitViaggio=function(){};

window.openEditViaggio=id=>{APP.state.modal='edit-viaggio';APP.state.editId=id;render()};
window.saveEditViaggio=function(){
  const v=APP.data.viaggi.find(x=>x.id===APP.state.editId);if(!v)return;
  v.nome=val('m-nome');v.cognome=val('m-cognome');v.utilizzo=val('m-utilizzo');
  v.kmI=parseFloat(val('m-kmi'));v.kmF=parseFloat(val('m-kmf'));
  v.ritiro=val('m-ritiro');v.riconsegna=val('m-riconsegna');
  v.tariffa=val('m-tariffa')||null;
  v.pieno=$('m-pieno')&&$('m-pieno').classList.contains('on');
  v.approvato=$('m-approvato')&&$('m-approvato').classList.contains('on');
  save();APP.state.modal=null;APP.state.editId=null;showAlert('✓ Viaggio aggiornato','ok');
};
window.deleteViaggio=id=>{if(!confirm('Eliminare questo viaggio?'))return;APP.data.viaggi=APP.data.viaggi.filter(v=>v.id!==id);save();render()};

window.setTariffaRapida=function(id,tariffa){
  const v=APP.data.viaggi.find(x=>x.id===id);if(!v)return;
  v.tariffa=tariffa||null;
  if(tariffa)v.approvato=true;
  save();renderInner();
};
window.saveAddUtente=function(){
  const nome=val('m-unome').trim(),cognome=val('m-ucognome').trim(),pass=val('m-upass'),ruolo=val('m-uruolo');
  let email=val('m-uemail').trim();
  if(!nome||!cognome||!pass){showAlert('Compila nome, cognome e password','err');return;}
  if(!email)email=generaEmail(nome,cognome);
  APP.data.utenti.push({id:uid(),nome:nome+' '+cognome,email,pass,ruolo});
  save();APP.state.modal=null;showAlert('✓ Utente aggiunto ('+email+')','ok');render();
};
window.openEditUtente=id=>{APP.state.modal='edit-utente';APP.state.editId=id;render()};
window.saveEditUtente=function(){
  const u=APP.data.utenti.find(x=>x.id===APP.state.editId);if(!u)return;
  const nome=val('m-unome').trim(),cognome=val('m-ucognome').trim(),email=val('m-uemail').trim(),pass=val('m-upass'),ruolo=val('m-uruolo');
  if(!nome||!cognome||!email){showAlert('Compila tutti i campi','err');return;}
  u.nome=nome+' '+cognome;u.email=email;u.ruolo=ruolo;if(pass)u.pass=pass;
  if(APP.state.user.id===u.id)APP.state.user={...u};
  save();APP.state.modal=null;showAlert('✓ Utente aggiornato','ok');render();
};
window.deleteUtente=id=>{if(!confirm('Eliminare questo utente?'))return;APP.data.utenti=APP.data.utenti.filter(u=>u.id!==id);save();render()};

window.openAddTeam=()=>{APP.state.modal='add-team';render()};
window.saveAddTeam=function(){
  const nome=val('m-tnome').trim(),desc=val('m-tdesc').trim(),resp=val('m-tresp');
  if(!nome){showAlert('Inserisci il nome del team','err');return;}
  APP.data.team.push({id:uid(),nome,descrizione:desc,responsabile:resp});
  save();APP.state.modal=null;showAlert('✓ Team creato','ok');render();
};
window.openEditTeam=id=>{APP.state.modal='edit-team';APP.state.editId=id;render()};
window.saveEditTeam=function(){
  const t=APP.data.team.find(x=>x.id===APP.state.editId);if(!t)return;
  t.nome=val('m-tnome').trim();t.descrizione=val('m-tdesc').trim();t.responsabile=val('m-tresp');
  save();APP.state.modal=null;showAlert('✓ Team aggiornato','ok');render();
};
window.deleteTeam=id=>{if(!confirm('Eliminare questo team?'))return;APP.data.team=APP.data.team.filter(t=>t.id!==id);save();render()};

window.saveLogo=()=>{APP.state.logoUrl=val('logo-url');save();showAlert('✓ Logo aggiornato','ok')};
window.saveTariffe=function(){
  CFG.tariffe.Scout.giornoBase=parseFloat(val('t-scout-g'))||20;CFG.tariffe.Scout.kmInclusi=parseFloat(val('t-scout-km'))||100;
  CFG.tariffe.Scout.extraOgni=parseFloat(val('t-scout-ogi'))||50;CFG.tariffe.Scout.extraCosto=parseFloat(val('t-scout-ext'))||5;
  CFG.tariffe.Altro.giornoBase=parseFloat(val('t-altro-g'))||30;CFG.tariffe.Altro.kmInclusi=parseFloat(val('t-altro-km'))||100;
  CFG.tariffe.Altro.extraOgni=parseFloat(val('t-altro-ogi'))||50;CFG.tariffe.Altro.extraCosto=parseFloat(val('t-altro-ext'))||5;
  CFG.consumoPer100km=parseFloat(val('t-cons'))||8;CFG.prezzoCarburante=parseFloat(val('t-prezzo'))||2.5;
  save();showAlert('✓ Tariffe salvate','ok');
};

load();render();
</script>
</body>
</html>
